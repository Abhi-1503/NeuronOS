name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    # pgvector/pgvector, not plain postgres — document_chunks.embedding (Database Spec §5.2)
    # needs the vector extension available for the migration to succeed at all.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neuronos
          POSTGRES_PASSWORD: neuronos
          POSTGRES_DB: neuronos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neuronos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://neuronos:neuronos@localhost:5432/neuronos_test
      DATABASE_URL: postgresql+asyncpg://neuronos_app:neuronos_app_dev_only@localhost:5432/neuronos_test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        # The test suite applies the Alembic migration itself (tests/conftest.py's
        # `_migrated_database` fixture) — this is what actually proves migrations run
        # cleanly against a fresh database, not a separate `alembic upgrade` step that
        # would just redundantly repeat it before pytest gets there.
        run: pytest -v
